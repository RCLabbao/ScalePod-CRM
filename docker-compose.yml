version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: scalepod-test-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: scalepod_crm_test
      MYSQL_USER: scalepod_test
      MYSQL_PASSWORD: scalepod_test
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - scalepod-test-data:/var/lib/mysql

volumes:
  scalepod-test-data:
